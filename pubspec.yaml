name: ess
description: "Employee Self Service App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.1
  persistent_bottom_nav_bar_v2: ^6.2.0
  intl: ^0.20.2
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  open_file: ^3.5.10
  http: ^1.6.0
  pinput: ^6.0.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  lottie: ^3.3.2
  flutter_native_splash: ^2.4.7
  fade_shimmer: ^2.4.0
  provider: ^6.1.5+1
  flutter_local_notifications: ^19.5.0
  permission_handler: ^12.0.1
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/ess-logo-splash.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/ess-logo-splash.png
    icon_background_color: "#F5F5F5"


flutter:
  uses-material-design: true

  assets:
     - assets/images/
     - assets/animations/


  fonts:
     - family: Poppins
       fonts:
         - asset: assets/fonts/Poppins-Regular.ttf
         - asset: assets/fonts/Poppins-Italic.ttf
           style: italic
         - asset: assets/fonts/Poppins-Bold.ttf
           weight: 700
         - asset: assets/fonts/Poppins-SemiBold.ttf
           weight: 600
     - family: Roboto
       fonts:
         - asset: assets/fonts/Roboto-Regular.ttf
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
